<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background-color: #0F172A; color: #E2E8F0; overflow-x: hidden; height: 100%; }
        .container { height: calc(100% - 80px); display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        
        /* أنماط شريط التشخيص */
        .diagnostic-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: rgba(0, 0, 0, 0.95); border-top: 1px solid #334155;
            padding: 8px; font-size: 10px; color: #94a3b8;
            height: 80px; overflow-y: auto; z-index: 200;
            font-family: monospace; white-space: pre-wrap;
        }
        .log-success { color: #4ade80; }
        .log-error { color: #f87171; }
        .log-info { color: #60a5fa; }
        
        /* أنماط الواجهة */
        input { width: 100%; padding: 15px; margin: 10px 0; border-radius: 10px; border: none; text-align: center; font-size: 18px; background: #1E293B; color: white; border: 1px solid #334155; }
        input:focus { outline: none; border-color: #3b82f6; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; margin-top: 10px; transition: all 0.2s; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="container">
        <div class="w-full max-w-sm text-center">
            <!-- الشعار -->
            <div class="mb-8">
                <h1 class="text-5xl font-bold text-white mb-2">👨‍👧 أبو الزهراء</h1>
                <p class="text-gray-400 text-sm">تطبيق الطفل - وضع الحماية</p>
            </div>
            
            <!-- واجهة الربط -->
            <div id="link-section" class="glass-panel bg-slate-800/50 rounded-2xl p-6 border border-slate-700">
                <p class="text-gray-300 mb-4">أدخل الكود الموجود في تطبيق الوالد</p>
                <input type="text" id="code-input" placeholder="أدخل الكود هنا" maxlength="9">
                <button onclick="handleLink()" id="btn-link">ربط الجهاز</button>
                <p id="error-msg" class="text-red-400 text-xs mt-2 hidden"></p>
            </div>

            <!-- واجهة النجاح -->
            <div id="status-section" class="status hidden glass-panel bg-green-900/20 rounded-2xl p-6 border border-green-700">
                <svg class="w-16 h-16 text-green-400 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                <p class="text-green-400 font-bold text-lg">تم الربط بنجاح!</p>
                <p class="text-gray-400 text-xs mt-2 mb-4">النظام يعمل في الخلفية الآن.</p>
                <button onclick="handleStartServices()" class="bg-blue-600 text-sm py-2 px-4 rounded-lg">إعادة تشغيل الخدمات</button>
            </div>
        </div>
    </div>

    <!-- === شريط التشخيص (Diagnostic Mode) === -->
    <div id="diag-box" class="diagnostic-bar">
        <span class="text-yellow-400 font-bold">[وضع الفحص الشامل]</span> جاري التهيئة...
    </div>

    <script>
        const input = document.getElementById('code-input');
        const linkSection = document.getElementById('link-section');
        const statusSection = document.getElementById('status-section');
        const errorMsg = document.getElementById('error-msg');
        const btnLink = document.getElementById('btn-link');

        // === دالة التسجيل (Logger) ===
        function log(msg, type = 'info') {
            const box = document.getElementById('diag-box');
            const time = new Date().toLocaleTimeString();
            let colorClass = '';
            if(type === 'error') colorClass = 'log-error';
            if(type === 'success') colorClass = 'log-success';
            if(type === 'info') colorClass = 'log-info';
            
            // تنظيف الرسالة الأولى
            if(box.innerText.includes('جاري التهيئة')) box.innerHTML = '';
            
            box.innerHTML += `<span class="${colorClass}">[${time}] ${msg}</span>\n`;
            box.scrollTop = box.scrollHeight;
            console.log(msg);
        }

        // === الوظائف الرئيسية ===
        
        document.addEventListener('DOMContentLoaded', () => {
            log('App DOM Loaded.', 'info');
            validateNativeBridge();
        });

        function validateNativeBridge() {
            if(typeof AndroidNative !== 'undefined') {
                log('✅ Native Bridge (AndroidNative) is READY.', 'success');
            } else {
                log('❌ ERROR: AndroidNative not found!', 'error');
            }
        }

        function handleLink() {
            const code = input.value.trim();
            if(code.length < 9) {
                showError('الكود يجب أن يكون 9 أرقام.');
                log('Validation Failed: Code length < 9', 'error');
                return;
            }
            
            hideError();
            btnLink.disabled = true;
            btnLink.innerText = "جاري الربط...";
            log(`Attempting to link with code: ${code}`, 'info');
            
            try {
                if(typeof AndroidNative !== 'undefined') {
                    AndroidNative.linkDevice(code);
                } else {
                    showError('خطأ داخلي: الكود غير جاهز');
                    log('Native call failed.', 'error');
                }
            } catch(e) {
                showError('استثناء: ' + e.message);
                log('Exception: ' + e.message, 'error');
            }
        }
        
        function handleStartServices() {
            log('Requesting service restart...', 'info');
            if(typeof AndroidNative !== 'undefined') AndroidNative.startServices();
        }
        
        // === Callbacks (يستدعيها Kotlin) ===
        
        window.onLinkSuccess = function() {
            log('✅ Link Success! Services should start.', 'success');
            linkSection.style.display = 'none';
            statusSection.classList.remove('hidden');
        };
        
        window.onLinkError = function(msg) {
            log('❌ Link Error: ' + msg, 'error');
            showError(msg);
            btnLink.disabled = false;
            btnLink.innerText = "ربط الجهاز";
        };

        window.onSetupComplete = function() {
            log('✅ All Permissions Granted.', 'success');
        };

        function showError(msg) {
            errorMsg.innerText = msg;
            errorMsg.classList.remove('hidden');
        }

        function hideError() {
            errorMsg.classList.add('hidden');
        }
    </script>
</body>
</html>
